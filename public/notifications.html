<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Notifications | LoveConnect</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
    body {
        margin: 0;
        padding: 20px;
        background: #f4f5f9;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
    }

    .container {
        width: 100%;
        max-width: 500px;
        padding: 18px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 2px 10px #0002;
        animation: fadeIn .25s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    h2 {
        text-align: center;
        margin-bottom: 10px;
        background: linear-gradient(135deg, #ff2d75, #ff6aa5);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .back {
        text-decoration: none;
        font-size: 15px;
        color: #666;
        display: inline-block;
        margin-bottom: 10px;
    }

    .note {
        padding: 12px;
        background: #fafafa;
        border-radius: 12px;
        border-left: 5px solid #ff2d75;
        margin-bottom: 12px;
        box-shadow: 0 1px 8px #0001;
        position: relative;
    }

    .note strong {
        color: #ff2d75;
    }

    .note-time {
        font-size: 12px;
        color: gray;
        margin-top: 4px;
    }

    .delete-btn {
        position: absolute;
        right: 10px;
        top: 8px;
        font-size: 14px;
        color: #ff2d75;
        cursor: pointer;
        display: none;
    }

    .note:hover .delete-btn {
        display: block;
    }

    .mark-read {
        padding: 10px 14px;
        font-size: 14px;
        background: #ff2d75;
        color: white;
        border-radius: 8px;
        text-align: center;
        cursor: pointer;
        margin-bottom: 15px;
        user-select: none;
    }
</style>
</head>

<body>

<div class="container">
    <a href="swipe.html" class="back">⬅ Back</a>
    <h2>Notifications</h2>

    <div id="markAllBtn" class="mark-read">Mark all as read</div>
    <div id="notificationsList"></div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="/js/notifications.js" defer></script>

</body>
</html>
