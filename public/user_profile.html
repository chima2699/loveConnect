 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>User Profile | LoveConnect</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
body{
    margin:0;
    background:#f5f6fa;
    font-family:'Segoe UI',sans-serif;
}

/* TOP BAR */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 16px;
    background:#fff;
    box-shadow:0 2px 6px rgba(0,0,0,.1);
}
.topbar h2{
    margin:0;
    font-size:22px;
    font-weight:800;
    color:#ff2d75;
}

/* PHOTO */
.photo-box{
    position:relative;
    width:100%;
    max-width:360px;
    height:420px; /* ✅ moderate size */
    margin:16px auto 0;
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 8px 25px rgba(0,0,0,.25);
    background:#eee;
}
.photo-box img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.photo-nav{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:32px;
    color:#fff;
    padding:10px;
    cursor:pointer;
    user-select:none;
    background:rgba(0,0,0,.25);
    border-radius:50%;
}
.photo-nav.left{ left:10px; }
.photo-nav.right{ right:10px; }

.online-dot{
    position:absolute;
    top:14px;
    right:14px;
    width:14px;
    height:14px;
    border-radius:50%;
    background:#2ecc71;
    border:2px solid #fff;
    display:none;
}

/* CONTENT */
.container{
    max-width:420px;
    margin:0 auto;
    padding:12px;
}

.name{
    font-size:22px;
    font-weight:700;
}
.location, .distance{
    color:#777;
    font-size:14px;
}

.stats{
    margin:10px 0;
    font-size:14px;
}

/* BUTTONS */
.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    font-size:15px;
    cursor:pointer;
    margin-top:8px;
}
.follow-btn{ background:#ff2d75;color:#fff; }
.unfollow-btn{ background:#ddd; }
.msg-btn{ background:#2ecc71;color:#fff; }
.block-btn{ background:#eee;color:#333; }
.report-btn{ background:#ffecec;color:#d63031; }

.call-row{
    display:flex;
    justify-content:center;
    gap:20px;
    margin:12px 0;
}
.call-btn{
    width:50px;
    height:50px;
    border-radius:50%;
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    box-shadow:0 4px 12px rgba(0,0,0,.2);
    cursor:pointer;
}

.section-title{
    margin-top:16px;
    font-weight:700;
}
.info-box{
    background:#fff;
    padding:12px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,.1);
    margin-top:6px;
}

.post{
    background:#fff;
    padding:10px;
    border-radius:12px;
    margin-top:10px;
}
.post img{
    width:100%;
    border-radius:10px;
    margin-top:6px;
}

/* BOTTOM NAV */
.bottombar{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:60px;
    background:#fff;
    box-shadow:0 -2px 8px rgba(0,0,0,.15);
    display:flex;
    justify-content:space-around;
    align-items:center;
}
.bottombar a{
    text-decoration:none;
    font-size:22px;
}
</style>
</head>

<body>

<div class="topbar">
    <h2>Profile</h2>
    <a href="message_list.html">💬</a>
</div>

<div class="photo-box">
    <img id="photo" src="/public/default.png">
    <div id="onlineDot" class="online-dot"></div>
    <div class="photo-nav left" id="prevPhoto">‹</div>
    <div class="photo-nav right" id="nextPhoto">›</div>
</div>

<div class="container">
    <div class="name" id="usernameLabel"></div>
    <div class="location" id="locationLabel"></div>
    <div class="distance" id="distanceLabel"></div>

    <div class="stats">
        <span id="followersCount">0</span> followers •
        <span id="followingCount">0</span> following
    </div>

    <button id="followBtn" class="btn follow-btn">Follow</button>
    <button id="msgBtn" class="btn msg-btn">Match to Chat</button>
<button id="giftBtn">🎁 Gift Coins</button>

    <div class="call-row">
        <div class="call-btn" id="voiceCallBtn">📞</div>
        <div class="call-btn" id="videoCallBtn">🎥</div>
    </div>

    <button id="blockBtn" class="btn block-btn">Block User</button>
    <button id="reportBtn" class="btn report-btn">Report User</button>

    <div class="section-title">About</div>
    <div class="info-box" id="userAbout"></div>

    <div class="section-title">Compatibility</div>
    <div class="info-box" id="compatibilityBox"></div>

    <div class="section-title">Posts</div>
    <div id="postsArea"></div>
</div>

<div class="bottombar">
    <a href="swipe.html">❤️</a>
    <a href="search.html">🔍</a>
    <a href="message_list.html">💬</a>
    <a href="wallet.html">💰</a>
    <a href="profile.html">👤</a>
</div>

<script src="/js/user_profile.js" defer></script>
</body>
</html>
