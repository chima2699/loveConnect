<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Call | LoveConnect</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
body{
  margin:0;
  background:#0e0e12;
  font-family:Segoe UI,sans-serif;
  color:white;
}
.screen{
  max-width:420px;
  margin:auto;
  height:100vh;
  position:relative;
}
video{
  width:100%;
  height:100%;
  object-fit:cover;
  background:black;
}
#localVideo{
  position:absolute;
  width:110px;
  height:160px;
  right:14px;
  bottom:100px;
  border-radius:12px;
  border:2px solid #ff2d75;
}
.top{
  position:absolute;
  top:16px;
  width:100%;
  text-align:center;
}
.controls{
  position:absolute;
  bottom:24px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:18px;
}
.ctrl{
  width:58px;height:58px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;cursor:pointer;
}
.gray{background:#333}
.red{background:#e53935}
.green{background:#ff2d75}
#ringingScreen{
  position:absolute;inset:0;
  background:#000c;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:5;
}
.acceptRow{display:flex;gap:30px;margin-top:20px}
</style>
</head>

<body>
<div class="screen">

  <video id="remoteVideo" autoplay playsinline></video>
  <video id="localVideo" autoplay muted playsinline></video>

  <div class="top">
    <h3 id="ringUser">—</h3>
    <div id="timerBox">00:00</div>
    <div id="coinCost"></div>
  </div>

  <div class="controls">
    <div class="ctrl gray" id="muteBtn">🎙</div>
    <div class="ctrl gray" id="cameraBtn">📷</div>
    <div class="ctrl red" id="endBtn">📞</div>
  </div>

  <div id="ringingScreen">
    <h2>Incoming call…</h2>
    <div class="acceptRow">
      <div class="ctrl green" id="acceptBtn">✔</div>
      <div class="ctrl red" id="rejectBtn">✖</div>
    </div>
  </div>

</div>

<audio id="ringtone" loop>
  <source src="/sounds/ringtone.mp3" type="audio/mpeg">
</audio>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/call.js" defer></script>
</body>
</html>
