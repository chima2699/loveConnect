<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Messages | LoveConnect</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body{
    margin:0;
    background:#f7f8fc;
    font-family:Segoe UI,sans-serif;
}

/* TOP BAR */
.topbar{
    background:#fff;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 3px 8px rgba(0,0,0,.08);
    position:sticky;
    top:0;
    z-index:1000;
}
.topbar-title{
    font-size:24px;
    font-weight:800;
    background:linear-gradient(135deg,#ff2d75,#ff6aa5);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
.profile-icon{
    font-size:22px;
    text-decoration:none;
}

/* CHAT LIST */
.chat-list{ padding-bottom:90px; }

.chat-item{
    background:#fff;
    display:flex;
    align-items:center;
    padding:14px;
    margin:10px auto;
    width:92%;
    border-radius:14px;
    cursor:pointer;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.chat-item img{
    width:56px;
    height:56px;
    border-radius:50%;
    object-fit:cover;
}

.chat-info{
    flex:1;
    margin-left:12px;
}

.chat-name{
    font-size:16px;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:6px;
}

.chat-last{
    font-size:14px;
    color:#777;
    max-width:200px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.typing{
    font-size:13px;
    color:#ff2d75;
}

.online-dot{
    width:10px;
    height:10px;
    background:#2ecc71;
    border-radius:50%;
}

.badge{
    background:#ff2d75;
    color:#fff;
    padding:4px 9px;
    border-radius:14px;
    font-size:12px;
    font-weight:700;
}

/* BOTTOM NAV */
.bottombar{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:72px;
    background:#fff;
    display:flex;
    justify-content:space-around;
    align-items:center;
    box-shadow:0 -3px 10px rgba(0,0,0,.1);
}
.bottombar a{
    text-align:center;
    text-decoration:none;
    font-size:13px;
    color:#555;
}
.bottombar i{
    display:block;
    font-size:22px;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="topbar-title">Messages</div>
    <a href="profile.html" class="profile-icon">👤</a>
</div>

<div id="chatList" class="chat-list"></div>

<div class="bottombar">
    <a href="swipe.html"><i>🏠</i>Home</a>
    <a href="post.html"><i>✍️</i>Post</a>
    <a href="message_list.html"><i>💬</i>Messages</a>
    <a href="wallet.html"><i>💰</i>Wallet</a>
    <a href="profile.html"><i>👤</i>Profile</a>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/message_list.js" defer></script>
</body>
</html>
