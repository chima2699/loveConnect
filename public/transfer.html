<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Transfer Coins | LoveConnect</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
body {
    margin: 0;
    background: #f6f7fb;
    font-family: 'Segoe UI', sans-serif;
    padding-bottom: 110px;
}

/* TOP BAR */
.topbar {
    background: white;
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    color: #ff2d75;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    position: sticky;
    top: 0;
    z-index: 3000;
}

.container {
    width: 92%;
    max-width: 460px;
    margin: 25px auto;
}

/* CARD */
.section {
    background: white;
    padding: 24px;
    border-radius: 16px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    margin-bottom: 25px;
}

.balance-title {
    font-size: 15px;
    text-align: center;
    color: #777;
    margin-bottom: 5px;
}

.balance-value {
    font-size: 40px;
    text-align: center;
    font-weight: bold;
    color: #ff2d75;
}

.fee-note {
    text-align:center;
    font-size:12px;
    margin-top:6px;
    color:#999;
}

h3 {
    margin-top: 0;
    font-size: 20px;
    font-weight: bold;
    color: #ff2d75;
}

label {
    font-weight: bold;
    margin-top: 12px;
    display: block;
}

input {
    width: 100%;
    padding: 13px;
    border-radius: 12px;
    border: 1px solid #ccc;
    background: #fafafa;
    margin-top: 6px;
    font-size: 15px;
}

.success, .error {
    margin-top: 12px;
    font-size: 14px;
    padding: 10px;
    border-radius: 8px;
    display: none;
}

.success { background:#e8ffe9; color:#2e7d32; }
.error { background:#ffe8e8; color:#c0392b; }

button {
    width: 100%;
    padding: 15px;
    margin-top: 18px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #ff2d75, #ff6aa5);
    color: white;
    font-size: 18px;
    cursor: pointer;
    font-weight: bold;
}

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

/* BOTTOM NAV */
.bottombar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 70px;
    background: white;
    display: flex;
    justify-content: space-around;
    align-items: center;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
}

.bottombar a {
    text-decoration: none;
    text-align: center;
    font-size: 13px;
    color: #555;
}
</style>
</head>

<body>

<div class="topbar">Transfer Coins</div>

<div class="container">

    <!-- BALANCE -->
    <div class="section">
        <p class="balance-title">Available Transfer Balance</p>
        <p class="balance-value" id="balance">0</p>
        <p class="fee-note">Only purchased coins can be transferred</p>
    </div>

    <!-- FORM -->
    <div class="section">
        <h3>📤 Send Coins</h3>

        <label>Recipient Username</label>
        <input id="recipient" placeholder="e.g. Michael007">

        <label>Coins</label>
        <input id="amount" type="number" min="1">

        <div id="errorBox" class="error"></div>
        <div id="successBox" class="success"></div>

        <button id="sendBtn">Send Coins</button>
    </div>

</div>

<!-- Bottom nav -->
<div class="bottombar">
    <a href="swipe.html">🏠 Home</a>
    <a href="search.html">🔍 Search</a>
    <a href="message_list.html">💬 Messages</a>
    <a href="wallet.html">💰 Wallet</a>
    <a href="profile.html">👤 Profile</a>
</div>

<!-- ✅ External JS -->
<script src="/js/transfer.js" defer></script>
</body>
</html>
