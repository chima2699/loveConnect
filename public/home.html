<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>LoveConnect – Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
/* ✅ SAME STYLE – UNCHANGED */
body {
  margin:0;
  padding:0;
  font-family: 'Arial', sans-serif;
  background:#f1f3f7;
  display:flex;
  justify-content:center;
}

.container {
  width:100%;
  max-width:480px;
  padding:15px;
}

/* TOP BAR */
.top-bar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}
.logo {
  font-size:26px;
  font-weight:bold;
  background: linear-gradient(135deg, #ff2d75, #ff6aa5);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
#helloUser {
  font-size:14px;
  color:#555;
}

/* NAV GRID */
.nav-grid {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
  margin-bottom:20px;
}
.nav-btn {
  background:white;
  text-decoration:none;
  padding:12px 5px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.07);
  text-align:center;
  font-size:14px;
  color:#333;
  font-weight:500;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.nav-btn img {
  width:30px;
  height:30px;
  margin-bottom:6px;
}

/* TABS */
.tabs {
  display:flex;
  background:#e5e7eb;
  border-radius:20px;
  padding:4px;
  margin-bottom:15px;
}
.tab {
  flex:1;
  padding:9px 0;
  text-align:center;
  font-weight:600;
  font-size:14px;
  border-radius:20px;
  cursor:pointer;
  color:#555;
}
.tab.active {
  background:#ff2d75;
  color:white;
}

/* STORIES */
.stories {
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding-bottom:8px;
  margin-bottom:18px;
}
.story {
  width:60px;
  text-align:center;
}
.story img {
  width:55px;
  height:55px;
  border-radius:50%;
  border:3px solid #ff2d75;
}
.story span {
  font-size:11px;
}

/* POSTS */
.post-card {
  background:white;
  border-radius:14px;
  padding:12px;
  margin-bottom:15px;
}
.post-header {
  display:flex;
  justify-content:space-between;
}
.post-user a {
  font-weight:bold;
  color:#ff2d75;
  text-decoration:none;
}
.post-time {
  font-size:11px;
  color:gray;
}
.post-actions {
  display:flex;
  gap:14px;
  font-size:14px;
}
.liked {
  color:#ff2d75;
  font-weight:bold;
}
.empty {
  text-align:center;
  margin-top:40px;
  color:#777;
}
</style>
</head>

<body>
<div class="container">

  <div class="top-bar">
    <div class="logo">LoveConnect</div>
    <div id="helloUser"></div>
  </div>

  <div class="stories" id="storiesBar"></div>

  <div class="nav-grid">
    <a class="nav-btn" href="profile.html">Profile</a>
    <a class="nav-btn" href="post.html">Create Post</a>
    <a class="nav-btn" href="swipe.html">Swipe Match</a>
    <a class="nav-btn" href="search.html">Search</a>
    <a class="nav-btn" href="wallet.html">Wallet</a>
    <a class="nav-btn" href="notifications.html">Alerts</a>
  </div>

  <div class="tabs">
    <div id="tabFollowing" class="tab active">Following</div>
    <div id="tabExplore" class="tab">Explore</div>
  </div>

  <div id="feedContainer"></div>
</div>

<!-- ✅ Socket -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<!-- ✅ External JS -->
<script src="/js/home.js" defer></script>

</body>
</html>
