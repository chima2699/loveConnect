<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register | LoveConnect</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
    body {
        margin:0;
        padding:0;
        background:#f5f6fa;
        font-family:sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .box {
        width:90%;
        max-width:380px;
        background:white;
        padding:25px;
        border-radius:12px;
        box-shadow:0 0 10px #0002;
    }

    h2 {
        text-align:center;
        margin-bottom:20px;
    }

    input {
        width:100%;
        padding:12px;
        margin:10px 0;
        border:1px solid #ccc;
        border-radius:10px;
        font-size:16px;
    }

    button {
        width:100%;
        padding:12px;
        border:none;
        border-radius:10px;
        background:#ff4081;
        color:white;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
        margin-top:10px;
    }

    button:disabled {
        opacity:.6;
        cursor:not-allowed;
    }

    .link {
        text-align:center;
        margin-top:10px;
    }

    .link a {
        color:#ff4081;
        text-decoration:none;
        font-weight:bold;
    }

    #error {
        margin-top:10px;
        color:#b00020;
        text-align:center;
        display:none;
        font-size:14px;
    }
</style>
</head>

<body>

<div class="box">
    <h2>Create Your Account</h2>

    <form id="registerForm" autocomplete="off">
        <input id="username" type="text" placeholder="Username (unique)" required />
        <input id="email" type="email" placeholder="Email" required />
        <input id="password" type="password" placeholder="Password (min 6 chars)" required />

        <button id="registerBtn" type="submit">Register</button>
    </form>

    <div id="error"></div>

    <div class="link">
        Already have an account? <a href="login.html">Login</a>
    </div>
</div>

<!-- ✅ External JS only -->
<script src="/js/register.js" defer></script>

</body>
</html>
